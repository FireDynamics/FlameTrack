name: Docs

on:
  push:
    branches: [ main ]
    paths:
      - "docs/**"
      - "src/**"           # API autodoc depends on source
      - "pyproject.toml"   # version shown in docs
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "docs/**"
      - "src/**"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Build Sphinx docs (warnings = errors)
        run: sphinx-build docs/source docs/_build/html -W --keep-going
